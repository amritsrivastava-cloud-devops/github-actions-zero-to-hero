name: Matrix Python

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  Python-validation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast:  false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version}}
      - name: python version printing
        run: python --version
