name: Smart Pipeline

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Lint step
        run: echo "Running lint checks"

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test step
        run: echo "Running tests"

  summary:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Print branch type
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "Main branch push"
          else
            echo "Feature branch push"
          fi

      - name: Print commit message
        run: echo "Commit message: ${{ github.event.head_commit.message || github.sha }}"
