name: Job Outputs

on:
  workflow_dispatch:

jobs:

  set-output:
    runs-on: ubuntu-latest

    outputs:
      today: ${{ steps.date-step.outputs.today }}

    steps:
      - name: Generate date
        id: date-step
        run: echo "today=$(date)" >> $GITHUB_OUTPUT

  print-output:
    runs-on: ubuntu-latest

    needs: generate-date

    steps:
      - name: print date
        run: echo "Today's date is ${{ needs.generate-date.outputs.today }}"

