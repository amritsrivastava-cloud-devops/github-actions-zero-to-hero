name: Different-OS

on:
 workflow_dispatch:

jobs:
  TEST1LINUX:
    runs-on: ubuntu-latest
    steps:
      - name: os name 
        run: uname -a
      - name: runner hostname
        run: hostname
      - name: current user
        run: whoami
      - name: docker vesion
        run: docker --version
      - name: python version
        run: python --version
      - name: node version check
        run: node --version
      - name: git version check
        run: git --version

  TEST2WINDOWS:
    runs-on: windows-latest
    steps:
      - name: os name 
        run: systeminfo | findstr /B /C:"OS Name"
      - name: runner hostname
        run: hostname
      - name: current user
        run: whoami

  TEST3MACOS:
    runs-on: macos-latest
    steps:
      - name: os name
        run: sw_vers
      - name: runner hostname
        run: hostname
      - name: current user
        run: whoami


  
