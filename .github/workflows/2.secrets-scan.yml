name: Secrets Scan

on:
  workflow_call:

jobs:
  secrets-scan:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          #check krega sare commits starting se 

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-actions@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
