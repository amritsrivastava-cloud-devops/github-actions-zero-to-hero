name: Deploy to server

# deploy safe / secure /tested app to prod

on:
  workflow_call:

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
    
          
      - name: ssh to prod server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
           echo "starting deploymet"
           mkdir devops-dep1

          
      - name: copy the docker -compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/devops-dep1

      - name: ssh to prod server and run the app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
           echo "starting deploymet"
           export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
           export DOCKER_TAG=${{ github.sha }}
           echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USER }} --password-stdin
           cd ~/devops-dep1 && docker compose down && docker compose up -d --build --force-recreate --pull always
          # sudo apt-get install docker.io docker-compose-v2 -y
          # sudo usermod -aG docker $USER && newgrp docker
