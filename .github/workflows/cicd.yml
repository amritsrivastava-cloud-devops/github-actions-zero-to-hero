# this is name of the workflow that will be displayed in the actions tab
name: CICD
# Manual click deliver workflow whenever user needs 
on:
  workflow_dispatch:
     inputs:
       environments:
          description: This is the env vlaue where this workflow runs
          default: 'dev'
          required: true
          type: choice
          options:
            - dev
            - prod 
            - staging 
  
jobs:
# every job needs seperate runner , its called parallalism
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from github"
        
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build docker container
        run: echo "docker container build "
        
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"
        
  deploy:
    #if: inputs.environments == 'dev'
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"

  

        
