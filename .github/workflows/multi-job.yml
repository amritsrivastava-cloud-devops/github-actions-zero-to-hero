name: Multi jobs

on:
 workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build application
        run: echo "building the app"
        
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: testing the application
        run: echo "testing the application"
        
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: deploying onto prod
        run: echo "deployment sucessfully completed"
  
  
