name: env-secrets

on:
  push:

jobs:
  use-env-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Use secret as env variable
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

        run: |
          echo "Docker username is set"
          echo "Token length: ${#DOCKER_TOKEN}"
