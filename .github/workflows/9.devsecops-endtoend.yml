name: DevSecOps End to End Pipeline

on:
  workflow_dispatch: 

jobs:
  code-quality:
    uses: ./.github/workflows/1.code-quality.yml

  secrets-scan:
    uses: ./.github/workflows/2.secrets-scan.yml

  dependency-scan:
    uses: ./.github/workflows/3.dependency-scan.yml

  docker-scan:
    uses: ./.github/workflows/5.docker-lint.yml

  build:
    needs: [code-quality, secrets-scan, dependency-scan, docker-scan]
    uses: ./.github/workflows/6.build-and-push.yml
    secrets: inherit

  trivy:
    needs: [build]
    uses: ./.github/workflows/7.image-scan.yml

    
